default:
  # cancel the job if a new pipeline is triggered on the same branch
  interruptible: true

workflow:
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "web"

stages:
  - docker-check
  - prepare
  - build-and-test

###
# Prepare: Docker build
###
variables:
  DOCKER_REGISTRY_KEY: "oss-android--docker"
  ARTIFACTORY_REGISTRY_URL: "${DOCKER_REGISTRY_KEY}.${ARTIFACTORY_HOST}"
  REGISTRY_IMAGE_X86_64: "${ARTIFACTORY_REGISTRY_URL}/telemetry-solution-x86_64:$CI_COMMIT_REF_SLUG" # Not in use at the moment
  REGISTRY_IMAGE_AARCH64: "${ARTIFACTORY_REGISTRY_URL}/telemetry-solution-aarch64:$CI_COMMIT_REF_SLUG"    

# check-docker-tag validates if the docker image is available in artifactory.
# It sets the variable DOCKER_IMAGE_NOT_PRESENT_IN_REGISTRY which is shared
# with subsequent jobs
check-docker-tag:
  stage: docker-check
  tags: [linux_x86_64]
  image: badouralix/curl-jq:alpine
  variables:
    GIT_STRATEGY: none
  script: 
    - curl -u ${ARTIFACTORY_USER}:${ARTIFACTORY_API_KEY}  -X GET ${ARTIFACTORY_URL}/artifactory/api/docker/${DOCKER_REGISTRY_KEY}/v2/telemetry-solution-x86_64/tags/list > tags
    - cat tags | jq ".tags | index(\"$CI_COMMIT_REF_SLUG\")" > docker-image-index || true
    - |-
        if [[ "$(cat docker-image-index)" == null ]]; then
          echo "DOCKER_IMAGE_NOT_PRESENT_IN_REGISTRY=1" >> build.env
        else
          echo "DOCKER_IMAGE_NOT_PRESENT_IN_REGISTRY=0" >> build.env
        fi
  artifacts:
    paths:
      - tags
      - docker-image-index
    reports:
      dotenv: build.env
 
# check-docker-change sets DOCKERFILE_CHANGED to 1 if the Dockerfile 
# has changed or if the pipeline is not part of a merge request. 
# Comparison is made with the target branch.
check-docker-change:
  stage: docker-check
  tags: [linux_x86_64]
  image: alpine:3.20.2
  variables:
    GIT_STRATEGY: none
  needs: 
    - check-docker-tag
  script: echo "DOCKERFILE_CHANGED=1" >> build.env
  rules:
    - changes:
        - .ci/Dockerfile
    - when: never
  artifacts:
    reports:
      dotenv: build.env

# Build the docker image if the image is not present in the registry or 
# if the dockerfile has changed.
.build-docker:
  image:
    name: mirrors--gcr-io.${ARTIFACTORY_HOST}/kaniko-project/executor:debug
    entrypoint: [""]
  stage: prepare
  script:
    - |-
      if [ "$DOCKER_IMAGE_NOT_PRESENT_IN_REGISTRY" == "1" ] || [ "$DOCKERFILE_CHANGED" == "1" ]; then
        mkdir -p /kaniko/.docker
        echo "{\"auths\":{\"${ARTIFACTORY_REGISTRY_URL}\":{\"auth\":\"$(printf "%s:%s" "${ARTIFACTORY_USER}" "${ARTIFACTORY_API_KEY}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
        /kaniko/executor \
          --registry-mirror mirrors--dockerhub.${ARTIFACTORY_HOST} \
          --context "${CI_PROJECT_DIR}" \
          --dockerfile "${CI_PROJECT_DIR}/.ci/Dockerfile" \
          --destination "${REGISTRY_IMAGE}"
      fi

build-docker-x64:
  variables:
    REGISTRY_IMAGE: $REGISTRY_IMAGE_X86_64
  extends: .build-docker
  tags: [linux_x86_64]

###
# Build and test:
###

# Base job for all the build and test jobs.
# It declares: The image, tag, cache and artifacts to use
.build-base:
  image: $REGISTRY_IMAGE_X86_64
  tags: [linux_x86_64]
  stage: build-and-test

build-ustress:
  extends: .build-base
  parallel:
    matrix:
      - UARCH: [V1, N1, N2]
        COMPILER: [aarch64-linux-gnu-gcc-10,aarch64-linux-gnu-gcc-13]
        USE_C_FLAG: [0, 1]
  script:
    - |
      cd benchmarks/ustress
      CC="$COMPILER" make CPU=NEOVERSE-"$UARCH" USE_C="$USE_C_FLAG"
      find . -type f -perm /111 -print | xargs zip "ustress-${UARCH}-${COMPILER}-USE_C-${USE_C_FLAG}.zip"
      make clean
  artifacts:
    paths:
      - benchmarks/ustress/ustress-*.zip
    expire_in: 7 days

build-sysstress:
  extends: .build-base
  script:
    - |
      cd benchmarks/sysstress
      mkdir bin
      cd bin
      CC=aarch64-linux-gnu-gcc-10 CXX=aarch64-linux-gnu-g++-10 cmake ..
      make
      EXECUTABLES=`find . -executable -type f -not -path "./CMakeFiles/*"`
      mkdir ../zip
      cp $EXECUTABLES ../zip/
      cd ../zip
      zip -9X ../sysstress.zip *
  artifacts:
    paths:
      - benchmarks/sysstress/sysstress.zip
    expire_in: 7 days

build-random-pointer-access:
  extends: .build-base
  script:
    - |
      cd benchmarks/random_pointer_access
      make
      mkdir -p artifacts
      cp random_pointer_access artifacts/
      make clean
  artifacts:
    paths:
      - benchmarks/random_pointer_access/artifacts/*
    expire_in: 7 days

build-matmul:
  extends: .build-base
  script:
    - |
      cd benchmarks/matmul
      make
      mkdir -p artifacts
      cp matmul_baseline matmul_ikj matmul_ikj_blocked artifacts/
      make clean
  artifacts:
    paths:
      - benchmarks/matmul/artifacts/*
    expire_in: 7 days

spe-parser:
  extends: .build-base
  parallel:
    matrix:
      - PYENV: 
        - py312
        - py311
        - py310
        - fix,type,pkg_meta
  script:
    - |
      python3 -m venv .venv
      source .venv/bin/activate
      pip install tox
      cd tools/spe_parser
      tox -e $PYENV
  artifacts:
    reports:
      junit:
        - tools/spe_parser/reports/*.xml

topdown-tool:
  extends: .build-base
  parallel:
    matrix:
      - PYENV: 
        - py312
        - py311
        - py310
        - codestyle,pkg_meta
        - mypy
  script:
    - |
      python3 -m venv .venv
      source .venv/bin/activate
      pip install tox
      cd tools/topdown_tool
      tox -e $PYENV
  artifacts:
    reports:
      junit:
        - tools/topdown_tool/reports/*.xml

topdown-tool-blackduck:
  extends: .build-base
  rules:
    # Only in merge request pipelines
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always
      allow_failure: false
    # Elsewhere, don’t include this job
    - if: $CI_PIPELINE_SOURCE == "web"
      when: never
  script:
    - |
      python3 -m venv .venv
      source .venv/bin/activate
      BASELINE_VERSION=$(cat .ci/blackduck-baseline-version)
      cd tools/topdown_tool
      python -m pip install .
      CURRENT_VERSION="${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME:-$CI_COMMIT_REF_NAME}"
      ../../.ci/blackduck-scan.sh $BASELINE_VERSION $CURRENT_VERSION $BLACKDUCK_TOPDOWN_TOOL_PROJECT_ID $BLACKDUCK_TOPDOWN_TOOL_PROJECT_NAME './topdown_tool,./tests'

validate-cpu-specs:
  extends: .build-base
  script:
    - |
      python3 -m venv .venv
      source .venv/bin/activate
      python -m pip install tools/topdown_tool
      validate-cpu-spec --spec-dir data/pmu/cpu --schema-dir data/schema/cpu

perf-json-generator:
  extends: .build-base
  script:
    - |
      export WORKSPACE=$PWD
      python3 -m venv .venv
      source .venv/bin/activate
      pushd tools/perf_json_generator
      pip install pre-commit
      pre-commit install
      pre-commit run --all-files
      git clone --sparse --depth=1 --single-branch https://github.com/torvalds/linux.git
      pushd linux
      git sparse-checkout add tools/perf
      popd
      find $WORKSPACE/data/* -name '*.json' | grep -Ev 'schema|-sme2-|cmn' | xargs -I '{}' ./generate.py linux/tools/perf --telemetry-files '{}'
      pushd linux
      git diff --name-only > changed_files.txt
      git ls-files --others --exclude-standard >> changed_files.txt
      git diff > perf-update.patch
      mkdir -p artifacts
      while read file; do cp --parents "$file" artifacts/; done < changed_files.txt
      popd
      popd 
      mv tools/perf_json_generator/linux/artifacts/tools/perf/pmu-events/arch/arm64 tools/perf_json_generator/linux/perf-update.patch .
  artifacts:
    paths:
      - arm64
      - perf-update.patch
    reports:
      junit:
        - tools/perf_json_generator/reports/*.xml
    expose_as: 'Perf JSON'
    expire_in: 7 days

topdown-tool-create-package:
  extends: .build-base
  image: python:3.10.18-bullseye
  tags: [linux_arm64]
  when: manual
  script:
    - |
      apt update
      apt install -y binutils
      python3 -m venv .venv
      source .venv/bin/activate
      pip install pyinstaller
      cd tools/topdown_tool
      pip install .
      pyinstaller --clean -Fsn topdown-tool --optimize 2 --bootloader-ignore-signals --copy-metadata topdown_tool --hidden-import topdown_tool.cpu_probe.cpu_factory --add-data topdown_tool/cpu_probe/metrics:topdown_tool/cpu_probe/metrics --add-data topdown_tool/cpu_probe/schemas:topdown_tool/cpu_probe/schemas topdown_tool/__main__.py
  artifacts:
    paths:
      - tools/topdown_tool/dist/topdown-tool
