files: '^tools/topdown_tool/'
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-ast
      - id: check-executables-have-shebangs
      - id: check-json
        exclude: '^tools/topdown_tool/tests/cpu_probe/fixtures/v1.0.schema-invalid.json'
      - id: check-vcs-permalinks
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: name-tests-test
        args: ["--pytest-test-first"]
      - id: requirements-txt-fixer
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
        exclude: 'fixtures/.*'
  - repo: https://github.com/PyCQA/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        args: ["--config", "tools/topdown_tool/setup.cfg"]
  - repo: https://github.com/pycqa/pylint
    rev: v3.3.1
    hooks:
      - id: pylint
        args: ["--rcfile", "tools/topdown_tool/pyproject.toml"]
        additional_dependencies:
          - rich
          - pydantic
          - pytest
          - pytest-mock
          - jsonschema
        exclude: '^tools/topdown_tool/tests/'
  - repo: 'https://github.com/codespell-project/codespell'
    rev: v2.3.0
    hooks:
      - id: codespell
        args: ["--ignore-words", "tools/topdown_tool/.codespell-ignore-words.txt"]
  - repo: local
    hooks:
      - id: check-branding-name
        name: check-branding-name
        entry: tools/topdown_tool/scripts/pre-commit/check_branding_name.sh
        language: system
        pass_filenames: true
        files: '^tools/topdown_tool/.*\.(md|rst|txt|py|toml|yaml|yml|json)$'
